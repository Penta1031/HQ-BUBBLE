<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>혚쾌버블 아카이브</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #e5e7eb; font-family: 'Pretendard', sans-serif; }
        
        /* 미디어 컨텐츠 기본 스타일 */
        .media-content { border-radius: 20px; overflow: hidden; max-width: 280px; background-color: #000; min-height: 150px; position: relative; }
        
        /* 커스텀 오디오 플레이어 스타일 (이미지 참고) */
        .audio-bubble {
            display: flex;
            align-items: center;
            width: 280px; /* 가로로 길게 */
            padding: 10px 14px;
            border-radius: 22px;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* 아티스트 (왼쪽) */
        .audio-bubble.artist {
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            color: #3b82f6; /* 파란색 포인트 */
        }

        /* 유저 (오른쪽) */
        .audio-bubble.user {
            background-color: #3b82f6;
            color: white;
        }

        .play-btn {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: transparent;
            border: none;
        }

        .progress-container {
            flex-grow: 1;
            height: 3px;
            background-color: rgba(0, 0, 0, 0.08);
            border-radius: 2px;
            position: relative;
        }

        .audio-bubble.user .progress-container {
            background-color: rgba(255, 255, 255, 0.25);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #3b82f6;
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        .audio-bubble.user .progress-bar {
            background-color: #ffffff;
        }

        .time-display {
            font-size: 10px;
            font-weight: 600;
            min-width: 30px;
            text-align: right;
            opacity: 0.8;
        }
        
        .media-content iframe, .media-content video, .media-content img { width: 100%; height: 100%; display: block; border: none; }
        
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: #f4ad3b; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="loadingOverlay" class="fixed inset-0 z-[100] bg-white/90 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="spinner mb-4"></div>
        <p class="text-gray-600 font-medium text-sm">미디어 데이터를 불러오는 중...</p>
    </div>

    <!-- 프로필 선택 -->
    <div id="selectionScreen" class="w-full max-w-[400px] h-[100dvh] sm:h-[800px] sm:rounded-[2rem] bg-[#f2f3f5] flex flex-col items-center justify-center shadow-2xl relative">
        <h1 class="text-xl font-bold text-gray-800 mb-10">혚쾌버블 아카이브</h1>
        <div class="flex gap-10">
            <button onclick="enterChat('혀비')" class="flex flex-col items-center gap-3 hover:scale-105 transition-transform focus:outline-none">
                <div class="w-20 h-20 rounded-full border-2 border-white overflow-hidden shadow-sm">
                    <img src="https://pbs.twimg.com/media/HFOi5gtasAASasa?format=jpg&name=small" class="w-full h-full object-cover">
                </div>
                <span class="text-gray-800 font-semibold">혀비</span>
            </button>
            <button onclick="enterChat('유말랑')" class="flex flex-col items-center gap-3 hover:scale-105 transition-transform focus:outline-none">
                <div class="w-20 h-20 rounded-full border-2 border-white overflow-hidden shadow-sm">
                    <img src="https://pbs.twimg.com/media/HFOi7g7bAAAEVPU?format=jpg&name=small" class="w-full h-full object-cover">
                </div>
                <span class="text-gray-800 font-semibold">유말랑</span>
            </button>
        </div>
    </div>

    <!-- 채팅 화면 -->
    <div id="chatScreen" class="hidden w-full max-w-[400px] h-[100dvh] sm:h-[800px] sm:rounded-[2rem] bg-[#f2f3f5] flex flex-col shadow-2xl overflow-hidden relative">
        <header class="bg-[#f2f3f5]/90 backdrop-blur-sm z-10 p-4 flex justify-between items-center border-b border-gray-200/50 sticky top-0">
            <button onclick="location.reload()" class="p-1 hover:bg-gray-200 rounded-full transition-colors">
                <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div class="text-[17px] font-bold text-gray-800" id="roomName">아티스트</div>
            <div class="w-8"></div>
        </header>
        <main id="chatArea" class="flex-1 overflow-y-auto no-scrollbar p-4 flex flex-col gap-1 pb-6"></main>
    </div>

    <script>
        let shData = [], hsData = [], mediaMap = {};
        let displayedCount = 0; 
        const PAGE_SIZE = 150; 
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTiiqBBRaOAc7OxW3NpJC5aRcIyq_V7xFLlDHgoN6trdI-xc0jxfJ_ak-qmeCIvjDKSWwgThnT1SK92/pub?gid=2099676467&single=true&output=csv";

        // ✅ 테스트용 강제 매핑
        const FORCED_LINK = "https://drive.google.com/file/d/1Z5VJyQfhQAa8S32LN8XxHjSjgI1LuIpw/preview";
        const TEST_FILE_NAME = "sh_2020_11_5_음성 - 1.mp4";

        async function loadData() {
            const overlay = document.getElementById('loadingOverlay');
            try {
                const [shRes, hsRes, csvRes] = await Promise.all([
                    fetch('./sh_data.json'),
                    fetch('./hs_data.json'),
                    fetch(CSV_URL)
                ]);

                shData = await shRes.json();
                hsData = await hsRes.json();
                
                const csvText = await csvRes.text();
                const rows = csvText.split('\n').slice(1);
                rows.forEach(row => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                    if (columns.length >= 3) {
                        const name = columns[0]?.replace(/"/g, '').trim().toLowerCase();
                        const link = columns[2]?.replace(/"/g, '').trim();
                        if(name && link) mediaMap[name] = link;
                    }
                });

                mediaMap[TEST_FILE_NAME.replace(/\s+/g, '').toLowerCase()] = FORCED_LINK;

                const sortFn = (a, b) => new Date(a.date.replace(/-/g, '/')) - new Date(b.date.replace(/-/g, '/'));
                shData.sort(sortFn); hsData.sort(sortFn);

                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 300);
            } catch (e) {
                console.error("데이터 로드 실패:", e);
                overlay.innerHTML = "<p class='text-red-500'>데이터 로딩 오류</p>";
            }
        }
        window.onload = loadData;

        function getMediaUrls(url) {
            let id = "";
            if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
            else if (url.includes('/file/d/')) id = url.split('/file/d/')[1].split('/')[0];
            
            return {
                iframe: id ? `https://drive.google.com/file/d/${id}/preview` : url,
                direct: id ? `https://drive.google.com/uc?export=download&id=${id}` : url,
                image: id ? `https://drive.google.com/uc?export=view&id=${id}` : url
            };
        }

        // 🌟 오디오 재생 제어 함수 보강
        function toggleAudio(btn, audioId) {
            const audio = document.getElementById(audioId);
            const bubble = btn.closest('.audio-bubble');
            const icon = btn.querySelector('svg path');
            const progressBar = bubble.querySelector('.progress-bar');
            const timeDisplay = bubble.querySelector('.time-display');

            if (audio.paused) {
                // 다른 모든 오디오 일시정지
                document.querySelectorAll('audio').forEach(a => {
                    if (a.id !== audioId) {
                        a.pause();
                        const otherIcon = a.closest('.audio-bubble')?.querySelector('.play-btn svg path');
                        if (otherIcon) otherIcon.setAttribute('d', 'M8 5v14l11-7z');
                    }
                });
                audio.play();
                icon.setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z');
            } else {
                audio.pause();
                icon.setAttribute('d', 'M8 5v14l11-7z');
            }

            audio.ontimeupdate = () => {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${progress}%`;
                
                const cur = audio.currentTime;
                const min = Math.floor(cur / 60);
                const sec = Math.floor(cur % 60);
                timeDisplay.innerText = `${min}:${sec.toString().padStart(2, '0')}`;
            };

            audio.onended = () => {
                icon.setAttribute('d', 'M8 5v14l11-7z');
                progressBar.style.width = '0%';
                timeDisplay.innerText = '0:00';
            };
        }

        function renderMessages(artist) {
            const chatArea = document.getElementById('chatArea');
            const data = (artist === '혀비' ? shData : hsData);
            const start = displayedCount;
            const end = Math.min(start + PAGE_SIZE, data.length);
            
            if (start >= data.length) return;

            let html = "";
            let lastDate = chatArea.querySelectorAll('.date-divider').length > 0 ? chatArea.querySelectorAll('.date-divider')[chatArea.querySelectorAll('.date-divider').length-1].innerText : "";

            for (let i = start; i < end; i++) {
                const item = data[i];
                const dObj = new Date(item.date.replace(/-/g, '/'));
                const dStr = dObj.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                const tStr = dObj.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });
                const isArt = (item.sender === artist);

                if (lastDate !== dStr) {
                    html += `<div class="date-divider mx-auto text-[#a0a0a0] text-[11px] my-4 font-medium">${dStr}</div>`;
                    lastDate = dStr;
                }

                const rawFileName = item.fileName || "";
                const cleanFileName = rawFileName.replace(/\s+/g, '').toLowerCase();
                const link = mediaMap[cleanFileName];

                let contentHtml = "";
                if (link) {
                    const urls = getMediaUrls(link);
                    const isImg = cleanFileName.match(/\.(jpg|jpeg|png|gif|webp)$/i) || item.content?.includes('(사진)');
                    
                    // 🌟 수정: 제목(rawFileName)에 '음성'이 포함되어 있으면 오디오 플레이어로 인식 (mp4여도 오디오로 재생)
                    const isAudio = rawFileName.includes('음성') || item.content?.includes('(음성');
                    
                    if (isImg) {
                        contentHtml = `<div class="media-content"><img src="${urls.image}" loading="lazy" onerror="this.src='${urls.direct}'"></div>`;
                    } else if (isAudio) {
                        const audioId = `audio_${i}`;
                        contentHtml = `
                            <div class="audio-bubble ${isArt ? 'artist' : 'user'}" onclick="toggleAudio(this.querySelector('.play-btn'), '${audioId}')">
                                <audio id="${audioId}" src="${urls.direct}" preload="metadata"></audio>
                                <div class="play-btn">
                                    <svg viewBox="0 0 24 24" width="22" height="22">
                                        <path d="M8 5v14l11-7z" fill="currentColor"/>
                                    </svg>
                                </div>
                                <div class="progress-container">
                                    <div class="progress-bar"></div>
                                </div>
                                <div class="time-display">0:00</div>
                            </div>`;
                    } else {
                        contentHtml = `
                            <div class="media-content" style="min-height: 200px;">
                                <iframe src="${urls.iframe}"></iframe>
                            </div>`;
                    }
                } else {
                    const text = (item.content || "").replace(/@@/g, '@@');
                    contentHtml = text || (rawFileName ? `<span class="text-xs text-gray-400 italic">[매칭 대기: ${rawFileName}]</span>` : "");
                }

                const prof = isArt ? (artist === '혀비' ? "https://pbs.twimg.com/media/HFOi5gtasAASasa?format=jpg&name=small" : "https://pbs.twimg.com/media/HFOi7g7bAAAEVPU?format=jpg&name=small") : "";

                html += `
                    <div class="flex w-full mt-4 ${!isArt ? 'justify-end' : 'justify-start'}">
                        ${isArt ? `<div class="w-10 h-10 rounded-full overflow-hidden mr-2 flex-shrink-0 border border-gray-200"><img src="${prof}" class="w-full h-full object-cover"></div>` : ""}
                        <div class="flex flex-col max-w-[90%] ${!isArt ? 'items-end' : 'items-start'}">
                            ${isArt ? `<div class="text-[13px] text-gray-800 mb-1 font-bold">${item.sender}</div>` : ""}
                            <div class="flex items-end gap-2 ${!isArt ? 'flex-row-reverse' : 'flex-row'}">
                                <div class="${link && (rawFileName.includes('음성') || item.content?.includes('(음성')) ? '' : (link ? '' : 'px-4 py-2.5 text-[14px] shadow-sm ' + (!isArt ? 'bg-[#646464] text-white rounded-l-[18px] rounded-tr-[18px] rounded-br-[4px]' : 'bg-white text-gray-900 rounded-r-[18px] rounded-bl-[18px] rounded-tl-[4px]'))}">
                                    ${contentHtml}
                                </div>
                                <div class="text-[10px] text-[#a3a3a3] min-w-max mb-1">${tStr}</div>
                            </div>
                        </div>
                    </div>`;
            }

            chatArea.insertAdjacentHTML('beforeend', html);
            displayedCount = end;
        }

        function enterChat(artist) {
            document.getElementById('selectionScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
            document.getElementById('roomName').innerText = artist;
            displayedCount = 0;
            document.getElementById('chatArea').innerHTML = "";
            renderMessages(artist);
            document.getElementById('chatArea').addEventListener('scroll', function() {
                if (this.scrollHeight - this.scrollTop <= this.clientHeight + 100) renderMessages(artist);
            });
        }
    </script>
</body>
</html>

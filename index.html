<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>혚쾌버블 아카이브</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #e5e7eb; font-family: 'Pretendard', sans-serif; }
        .media-content { border-radius: 20px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05); max-width: 240px; background-color: #000; min-height: 40px; }
        .media-content video, .media-content img { width: 100%; display: block; border: none; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: #f4ad3b; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="loadingOverlay" class="fixed inset-0 z-[100] bg-white/90 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="spinner mb-4"></div>
        <p class="text-gray-600 font-medium text-sm">데이터를 연결 중입니다...</p>
    </div>

    <div id="selectionScreen" class="w-full max-w-[400px] h-[100dvh] sm:h-[800px] sm:rounded-[2rem] bg-[#f2f3f5] flex flex-col items-center justify-center shadow-2xl relative border-4 border-gray-800">
        <h1 class="text-xl font-bold text-gray-800 mb-10">혚쾌버블 아카이브</h1>
        <div class="flex gap-10">
            <button onclick="enterChat('혀비')" class="flex flex-col items-center gap-3"><img src="https://pbs.twimg.com/media/HFOi5gtasAASasa?format=jpg&name=small" class="w-20 h-20 rounded-full border-2 border-white object-cover"><span class="text-gray-800 font-semibold">혀비</span></button>
            <button onclick="enterChat('유말랑')" class="flex flex-col items-center gap-3"><img src="https://pbs.twimg.com/media/HFOi7g7bAAAEVPU?format=jpg&name=small" class="w-20 h-20 rounded-full border-2 border-white object-cover"><span class="text-gray-800 font-semibold">유말랑</span></button>
        </div>
    </div>

    <div id="chatScreen" class="hidden w-full max-w-[400px] h-[100dvh] sm:h-[800px] sm:rounded-[2rem] bg-[#f2f3f5] flex flex-col shadow-2xl overflow-hidden relative border-4 border-gray-800">
        <header class="bg-[#f2f3f5]/90 backdrop-blur-sm z-10 p-4 flex justify-between items-center border-b border-gray-200/50 sticky top-0">
            <button onclick="location.reload()"><svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
            <div class="text-[17px] font-bold text-gray-800" id="roomName">아티스트</div>
            <div class="w-6"></div>
        </header>
        <main id="chatArea" class="flex-1 overflow-y-auto no-scrollbar p-4 flex flex-col gap-1 pb-6"></main>
    </div>

    <script>
        let shData = [], hsData = [], mediaMap = {};
        let currentArtist = "";
        let displayedCount = 0; 
        const PAGE_SIZE = 150; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycby08J7GSk5UtibojtjAYLnUHeuqqbkD1QAgmb3N2sAnMag9ZdLBl_9NHnKuxN-LvPYP3A/exec";

        async function loadData() {
            const overlay = document.getElementById('loadingOverlay');
            try {
                // 깃허브 배포 시에는 경로가 index.html과 같으므로 ./파일명.json 으로 호출
                const [shRes, hsRes, sheetRes] = await Promise.all([
                    fetch('./sh_data.json'),
                    fetch('./hs_data.json'),
                    fetch(GAS_URL)
                ]);

                shData = await shRes.json();
                hsData = await hsRes.json();
                const sheetData = await sheetRes.json();

                // 🌟 [수정 포인트] 시트 데이터 매핑 로직 강화
                sheetData.forEach(row => {
                    // row 객체에서 제목(A열)과 코드(C열)를 순서대로 추출
                    const vals = Object.values(row);
                    const name = vals[0]?.toString().trim(); // 첫 번째 열 (제목)
                    const link = vals[2]?.toString().trim(); // 세 번째 열 (코드)
                    if(name && link) mediaMap[name] = link;
                });

                const sortFn = (a, b) => new Date(a.date.replace(/-/g, '/')) - new Date(b.date.replace(/-/g, '/'));
                shData.sort(sortFn); hsData.sort(sortFn);

                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; console.log("✅ 연결된 미디어 수:", Object.keys(mediaMap).length); }, 300);
            } catch (e) {
                console.error(e);
                overlay.innerHTML = "<p class='text-red-500'>로드 실패</p>";
            }
        }
        window.onload = loadData;

        function getDirectUrl(url) {
            if (!url) return "";
            let id = "";
            if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
            else if (url.includes('/file/d/')) id = url.split('/file/d/')[1].split('/')[0];
            return id ? `https://drive.google.com/uc?export=download&id=${id}` : url;
        }

        function parseToDateObj(dateStr) {
            let s = dateStr.replace(/-/g, '/');
            if (s.includes('AM') || s.includes('PM')) {
                let [d, t] = s.split(' ');
                let [h, m] = t.replace(/AM|PM/g, '').split(':');
                h = parseInt(h);
                if (t.includes('PM') && h !== 12) h += 12;
                if (t.includes('AM') && h === 12) h = 0;
                s = `${d} ${h}:${m}`;
            }
            return new Date(s);
        }

        function renderMessages(artist) {
            const chatArea = document.getElementById('chatArea');
            const fullData = (artist === '혀비' ? shData : hsData);
            const start = displayedCount;
            const end = Math.min(start + PAGE_SIZE, fullData.length);
            if (start >= fullData.length) return; 

            const chunk = fullData.slice(start, end);
            let htmlFragment = "";
            const dateNodes = chatArea.querySelectorAll('.date-divider');
            let lastDate = dateNodes.length > 0 ? dateNodes[dateNodes.length - 1].innerText : "";

            chunk.forEach(item => {
                const dateObj = parseToDateObj(item.date);
                const dStr = dateObj.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                const tStr = dateObj.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });
                const isArt = (item.sender === artist);

                if (lastDate !== dStr) {
                    htmlFragment += `<div class="date-divider mx-auto text-[#a0a0a0] text-[11px] my-4 font-medium">${dStr}</div>`;
                    lastDate = dStr;
                }

                const prof = isArt ? (artist === '혀비' ? "https://pbs.twimg.com/media/HFOi5gtasAASasa?format=jpg&name=small" : "https://pbs.twimg.com/media/HFOi7g7bAAAEVPU?format=jpg&name=small") : "";
                
                let contentHtml = "";
                // JSON에 적힌 파일명과 시트 제목 대조
                const sLink = mediaMap[item.fileName?.trim()];
                
                if (sLink) {
                    const src = getDirectUrl(sLink);
                    if (item.type === 'image' || item.content.includes('(사진)')) {
                        contentHtml = `<img src="${src}" class="rounded-[20px]" loading="lazy">`;
                    } else if (item.content.includes('(음성')) {
                        contentHtml = `<audio controls class="w-full h-10 mt-1"><source src="${src}" type="audio/mpeg"></audio>`;
                    } else {
                        contentHtml = `<video controls class="rounded-[20px] w-full bg-black"><source src="${src}" type="video/mp4"></video>`;
                    }
                } else {
                    // 유저명을 @@로 변환
                    contentHtml = item.content.replace(/@@/g, '@@');
                }

                htmlFragment += `
                    <div class="flex w-full mt-4 ${!isArt ? 'justify-end' : 'justify-start'}">
                        ${isArt ? `<div class="w-10 h-10 rounded-full overflow-hidden mr-2 flex-shrink-0 border border-gray-200"><img src="${prof}" class="w-full h-full object-cover"></div>` : ""}
                        <div class="flex flex-col max-w-[75%] ${!isArt ? 'items-end' : 'items-start'}">
                            ${isArt ? `<div class="text-[13px] text-gray-800 mb-1 font-bold">${item.sender}</div>` : ""}
                            <div class="flex items-end gap-2 ${!isArt ? 'flex-row-reverse' : 'flex-row'}">
                                <div class="${sLink ? 'media-content' : 'px-4 py-2.5 text-[15.5px] shadow-sm ' + (!isArt ? 'bg-[#646464] text-white rounded-l-[18px] rounded-tr-[18px] rounded-br-[4px]' : 'bg-white text-gray-900 rounded-r-[18px] rounded-bl-[18px] rounded-tl-[4px]')}">
                                    ${contentHtml}
                                </div>
                                <div class="text-[10px] text-[#a3a3a3] min-w-max mb-1">${tStr}</div>
                            </div>
                        </div>
                    </div>`;
            });

            chatArea.insertAdjacentHTML('beforeend', htmlFragment);
            displayedCount += chunk.length;
        }

        function enterChat(artist) {
            currentArtist = artist;
            document.getElementById('selectionScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
            document.getElementById('roomName').innerText = artist;
            renderMessages(artist);
            document.getElementById('chatArea').addEventListener('scroll', function() {
                if (this.scrollHeight - this.scrollTop <= this.clientHeight + 100) renderMessages(currentArtist);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>혚쾌버블 아카이브</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #e5e7eb; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }

        .media-content {
            border-radius: 20px;
            overflow: hidden;
            max-width: 280px;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
            background: #f3f4f6;
        }
        .media-content:active { transform: scale(0.98); }

        .thumbnail-mode {
            background-color: #f3f4f6;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .thumbnail-mode img {
            width: 100%;
            height: auto;
            max-height: 400px;
            border-radius: 20px;
            object-fit: cover;
            display: block;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.2);
        }

        .play-icon {
            width: 40px;
            height: 40px;
            color: white;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        #videoPopup, #profilePopup {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.9);
        }

        .popup-content {
            position: relative;
            width: 100%;
            max-width: min(1000px, calc(100vw - 40px));
            max-height: calc(100vh - 40px);
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #videoPopup img {
            max-width: 100%;
            max-height: calc(100vh - 40px);
            object-fit: contain;
            display: block;
        }

        #videoPopup video {
            width: 100%;
            max-width: 100%;
            max-height: calc(100vh - 40px);
            display: block;
            background: #000;
            object-fit: contain;
        }

        #videoPopup iframe {
            width: 100%;
            height: 90vh;
            border: none;
            display: block;
            background: #000;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        #profilePopup { background-color: rgba(0, 0, 0, 0.8); z-index: 300; }
        .profile-selection-card { background: white; width: 90%; max-width: 360px; border-radius: 24px; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .profile-option { aspect-ratio: 1/1; border-radius: 16px; overflow: hidden; cursor: pointer; border: 3px solid transparent; transition: border-color 0.2s; position: relative; }
        .profile-option.selected { border-color: #3b82f6; }
        .profile-option img { width: 100%; height: 100%; object-fit: cover; }
        .profile-option .profile-name-badge {
            position: absolute;
            left: 6px;
            right: 6px;
            bottom: 6px;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 10px;
            font-weight: 700;
            text-align: center;
            padding: 4px 6px;
            border-radius: 999px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .img-error { font-size: 11px; color: #9ca3af; text-align: center; padding: 10px; background: #fff; border-radius: 12px; border: 1px solid #eee; width: 100%; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: #f4ad3b; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #searchContainer { transition: all 0.3s ease-in-out; max-height: 0; opacity: 0; overflow: hidden; }
        #searchContainer.active { max-height: 80px; opacity: 1; padding: 8px 16px; }

        .tab-btn { position: relative; flex: 1; text-align: center; padding: 12px; font-weight: 600; font-size: 14px; color: #9ca3af; transition: color 0.2s; }
        .tab-btn.active { color: #3b82f6; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 2px; background-color: #3b82f6; border-radius: 2px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; background-color: #fff; }
        .gallery-item { aspect-ratio: 1 / 1; overflow: hidden; position: relative; cursor: pointer; background-color: #f3f4f6; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        .gallery-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 12px 4px 4px 4px;
            font-size: 9px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            line-height: 1;
            font-weight: 500;
        }

        .highlight { background-color: #fef08a; color: #1a1a1a; padding: 0 2px; border-radius: 2px; font-weight: bold; }
        .highlight-active { background-color: #facc15; box-shadow: 0 0 0 2px #facc15; }
        .bubble-content { word-break: break-all; }

        .video-thumb-wrap {
            position: relative;
            width: 100%;
        }

        .video-badge {
            position: absolute;
            right: 8px;
            top: 8px;
            z-index: 3;
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 6px;
            border-radius: 999px;
            line-height: 1;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="loadingOverlay" class="fixed inset-0 z-[100] bg-white/90 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="spinner mb-4"></div>
        <p class="text-gray-600 font-medium text-sm">데이터를 연결하는 중...</p>
    </div>

    <div id="videoPopup" onclick="closePopup()">
        <div class="popup-content" id="popupContent" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closePopup()">✕</div>
        </div>
    </div>

    <div id="profilePopup">
        <div class="profile-selection-card">
            <h2 class="text-center font-bold text-lg text-gray-800" id="profilePopupTitle">프로필 선택</h2>
            <div class="profile-grid" id="profileOptionGrid"></div>
            <button onclick="startWithProfile()" class="w-full bg-blue-500 text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition-colors">이 프로필로 시작하기</button>
            <button onclick="closeProfilePicker()" class="w-full text-gray-400 text-sm py-1">취소</button>
        </div>
    </div>

    <div id="selectionScreen" class="w-full max-w-[400px] h-[100dvh] sm:h-[800px] sm:rounded-[2rem] bg-[#f2f3f5] flex flex-col items-center justify-center shadow-2xl relative p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">혚쾌버블 아카이브</h1>
        <p class="text-sm text-gray-500 mb-10 text-center">채팅하고 싶은 멤버를 선택하고<br>표시될 이름을 설정하세요.</p>

        <div class="w-full max-w-[280px] mb-12">
            <label class="block text-[11px] font-bold text-gray-400 mb-2 ml-1">내 이름 설정 (@@)</label>
            <input type="text" id="userNicknameInput" value="@@" placeholder="이름을 입력하세요"
                   class="w-full px-4 py-3 rounded-2xl bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all text-sm font-medium">
        </div>

        <div class="flex gap-10">
            <button onclick="openProfilePicker('혀비')" class="flex flex-col items-center gap-3 hover:scale-105 transition-transform focus:outline-none">
                <div class="w-24 h-24 rounded-full border-4 border-white overflow-hidden shadow-md">
                    <img src="https://pbs.twimg.com/media/HFXchlbbQAAkn3k?format=jpg&name=large" class="w-full h-full object-cover">
                </div>
                <span class="text-gray-800 font-bold text-lg">혀비</span>
            </button>
            <button onclick="openProfilePicker('유말랑')" class="flex flex-col items-center gap-3 hover:scale-105 transition-transform focus:outline-none">
                <div class="w-24 h-24 rounded-full border-4 border-white overflow-hidden shadow-md">
                    <img src="https://pbs.twimg.com/media/HFXc0UJa8AA0nNv?format=jpg&name=large" class="w-full h-full object-cover">
                </div>
                <span class="text-gray-800 font-bold text-lg">유말랑</span>
            </button>
        </div>
    </div>

    <div id="chatScreen" class="hidden w-full max-w-[400px] h-[100dvh] sm:h-[800px] sm:rounded-[2rem] bg-[#f2f3f5] flex flex-col shadow-2xl overflow-hidden relative border-x border-gray-200">
        <header class="bg-[#f2f3f5]/90 backdrop-blur-sm z-30 p-4 flex justify-between items-center border-b border-gray-200/50 sticky top-0">
            <button onclick="location.reload()" class="p-1 hover:bg-gray-200 rounded-full transition-colors">
                <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div class="text-[17px] font-bold text-gray-800" id="roomName">아티스트</div>
            <button onclick="toggleSearch()" class="p-1 hover:bg-gray-200 rounded-full transition-colors">
                <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </button>
        </header>

        <div class="flex bg-white border-b border-gray-100 z-20">
            <button id="chatTab" onclick="switchView('chat')" class="tab-btn active">채팅</button>
            <button id="galleryTab" onclick="switchView('gallery')" class="tab-btn">갤러리</button>
        </div>

        <div id="searchContainer" class="bg-white border-b border-gray-100 z-20">
            <div class="flex items-center gap-2">
                <div class="relative flex-1 flex items-center bg-gray-100 rounded-full px-3">
                    <input type="text" id="searchInput" placeholder="검색어 입력..."
                           class="w-full py-2 bg-transparent text-sm focus:outline-none transition-all"
                           oninput="handleSearchInput()">
                    <button id="clearSearchBtn" onclick="cancelSearch()" class="hidden text-gray-400 hover:text-gray-600 p-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div id="searchNav" class="hidden flex items-center gap-1 text-[12px] font-bold text-gray-500 whitespace-nowrap px-1">
                    <button onclick="navSearch(-1)" class="p-1.5 hover:bg-gray-100 rounded-lg">▲</button>
                    <span id="searchStatus">0 / 0</span>
                    <button onclick="navSearch(1)" class="p-1.5 hover:bg-gray-100 rounded-lg">▼</button>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-hidden flex flex-col relative">
            <main id="chatArea" class="flex-1 overflow-y-auto no-scrollbar p-4 flex flex-col gap-1 pb-6 bg-[#f2f3f5]"></main>
            <main id="galleryArea" class="hidden flex-1 overflow-y-auto no-scrollbar bg-white"></main>
        </div>
    </div>

    <script>
        let shData = [], hsData = [], mediaMap = {};
        let currentArtistData = [];
        let displayedCount = 0;
        let currentArtistName = "";
        let currentView = 'chat';
        let userNickname = "@@";
        let selectedProfileImg = "";
        const PAGE_SIZE = 150;

        let searchIndices = [];
        let currentMatchIdx = -1;
        let activeQuery = "";

        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTiiqBBRaOAc7OxW3NpJC5aRcIyq_V7xFLlDHgoN6trdI-xc0jxfJ_ak-qmeCIvjDKSWwgThnT1SK92/pub?gid=2099676467&single=true&output=csv";

        const artistProfiles = {
            '혀비': [
                {
                    name: '혀비',
                    url: 'https://pbs.twimg.com/media/HFXchlbbQAAkn3k?format=jpg&name=large'
                },
                {
                    name: '승짱',
                    url: 'https://pbs.twimg.com/media/HFXcesVagAAytqG?format=jpg&name=medium'
                },
                {
                    name: '승짱',
                    url: 'https://pbs.twimg.com/media/HFXcfr7a8AEygcA?format=jpg&name=medium'
                },
                {
                    name: '승짱',
                    url: 'https://pbs.twimg.com/media/HFXcgQsa8AIiJqP?format=jpg&name=medium'
                },
                {
                    name: '튼튼한밀루승짱',
                    url: 'https://pbs.twimg.com/media/HFXcg6Ia8AA0cTL?format=jpg&name=medium'
                },
                {
                    name: '혀비',
                    url: 'https://pbs.twimg.com/media/HFXchOha8AE3pJs?format=jpg&name=large'
                }
            ],
            '유말랑': [
                {
                    name: '유말랑',
                    url: 'https://pbs.twimg.com/media/HFXc0UJa8AA0nNv?format=jpg&name=large'
                },
                {
                    name: '유말랑',
                    url: 'https://pbs.twimg.com/media/HFXc00BbMAAE2kb?format=jpg&name=medium'
                },
                {
                    name: '유말랑',
                    url: 'https://pbs.twimg.com/media/HFXc1Ypa8AA01Zd?format=jpg&name=large'
                },
                {
                    name: '유말랑',
                    url: 'https://pbs.twimg.com/media/HFXeOjpbQAAJOxG?format=jpg&name=large'
                },
                {
                    name: '유말랑',
                    url: 'https://pbs.twimg.com/media/HFXeRHGa8AEQPZO?format=jpg&name=small'
                },
                {
                    name: '유말랑',
                    url: 'https://pbs.twimg.com/media/HFXf0v6a8AI0yIa?format=jpg&name=large'
                }
            ]
        };

        const defaultArtistCard = {
            '혀비': {
                name: '혀비',
                url: 'https://pbs.twimg.com/media/HFXchlbbQAAkn3k?format=jpg&name=large'
            },
            '유말랑': {
                name: '유말랑',
                url: 'https://pbs.twimg.com/media/HFXc0UJa8AA0nNv?format=jpg&name=large'
            }
        };

        function superClean(name) {
            if (!name) return "";
            return name.toString().split('.')[0].replace(/[^a-z0-9가-힣]/gi, '').toLowerCase();
        }

        function csvSplit(line) {
            return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^\s*"|"\s*$/g, '').trim());
        }

        function extractDriveId(link = "") {
            if (!link) return "";
            if (link.includes('id=')) return link.split('id=')[1].split('&')[0];
            if (link.includes('/file/d/')) return link.split('/file/d/')[1].split('/')[0];
            if (link.includes('/uc?') && link.includes('id=')) return link.split('id=')[1].split('&')[0];
            return "";
        }

        function setMediaMapEntry(title, fileId, link) {
            const safeTitle = (title || "").trim();
            const safeId = (fileId || "").trim() || extractDriveId(link);
            const safeLink = (link || "").trim();

            if (!safeTitle) return;

            const payload = {
                title: safeTitle,
                id: safeId,
                link: safeLink
            };

            mediaMap[safeTitle.replace(/\s+/g, '').toLowerCase()] = payload;

            const superKey = superClean(safeTitle);
            if (superKey) mediaMap[superKey] = payload;
        }

        async function loadData() {
            const overlay = document.getElementById('loadingOverlay');
            try {
                const [shRes, hsRes, csvRes] = await Promise.all([
                    fetch('./sh_data.json'),
                    fetch('./hs_data.json'),
                    fetch(CSV_URL)
                ]);

                shData = await shRes.json();
                hsData = await hsRes.json();

                const csvText = await csvRes.text();
                const rows = csvText.split('\n').slice(1);

                rows.forEach(row => {
                    if (!row.trim()) return;
                    const columns = csvSplit(row);

                    if (columns.length >= 3) {
                        const rawName = columns[0] || "";
                        const fileId = columns[1] || "";
                        const link = columns[2] || "";
                        if (rawName && (fileId || link)) {
                            setMediaMapEntry(rawName, fileId, link);
                        }
                    }
                });

                for (let key in testMappings) {
                    setMediaMapEntry(key, testMappings[key].id, testMappings[key].link);
                }

                const sortFn = (a, b) => parseDate(a.date) - parseDate(b.date);
                shData.sort(sortFn);
                hsData.sort(sortFn);

                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 300);
            } catch (e) {
                console.error(e);
                overlay.innerHTML = "<p class='text-red-500 text-center p-4'>데이터 로드 실패</p>";
            }
        }
        window.onload = loadData;

        function openProfilePicker(artist) {
            currentArtistName = artist;
            const popup = document.getElementById('profilePopup');
            const grid = document.getElementById('profileOptionGrid');
            const title = document.getElementById('profilePopupTitle');

            title.innerText = `${artist}의 프로필 선택`;
            grid.innerHTML = "";

            const list = artistProfiles[artist];
            selectedProfileImg = list[0].url;

            list.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = `profile-option ${i === 0 ? 'selected' : ''}`;
                div.innerHTML = `
                    <img src="${item.url}">
                    <div class="profile-name-badge">${item.name}</div>
                `;
                div.onclick = () => {
                    document.querySelectorAll('.profile-option').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedProfileImg = item.url;
                };
                grid.appendChild(div);
            });
            popup.style.display = 'flex';
        }

        function closeProfilePicker() {
            document.getElementById('profilePopup').style.display = 'none';
        }

        function startWithProfile() {
            userNickname = document.getElementById('userNicknameInput').value.trim() || "@@";
            closeProfilePicker();
            enterChat(currentArtistName);
        }

        function parseDate(dateStr) {
            let s = dateStr.replace(/-/g, '/');
            if (s.includes('AM') || s.includes('PM')) {
                let [d, t] = s.split(' ');
                let [h, m] = t.replace(/AM|PM/g, '').split(':');
                h = parseInt(h);
                if (t.includes('PM') && h !== 12) h += 12;
                if (t.includes('AM') && h === 12) h = 0;
                s = `${d} ${h}:${m}`;
            }
            return new Date(s);
        }

        function toggleSearch() {
            const container = document.getElementById('searchContainer');
            container.classList.toggle('active');
            if (!container.classList.contains('active')) {
                cancelSearch();
            } else {
                document.getElementById('searchInput').focus();
            }
        }

        function cancelSearch() {
            const input = document.getElementById('searchInput');
            const nav = document.getElementById('searchNav');
            const clearBtn = document.getElementById('clearSearchBtn');
            const chatArea = document.getElementById('chatArea');
            const currentScroll = chatArea.scrollTop;

            input.value = "";
            activeQuery = "";
            searchIndices = [];
            currentMatchIdx = -1;

            nav.classList.add('hidden');
            clearBtn.classList.add('hidden');
            renderMessages(currentArtistName, true);

            setTimeout(() => { chatArea.scrollTop = currentScroll; }, 0);
        }

        function handleSearchInput() {
            const query = document.getElementById('searchInput').value.trim();
            const nav = document.getElementById('searchNav');
            const clearBtn = document.getElementById('clearSearchBtn');

            if (query.length < 1) {
                activeQuery = "";
                searchIndices = [];
                currentMatchIdx = -1;
                nav.classList.add('hidden');
                clearBtn.classList.add('hidden');
                renderMessages(currentArtistName, true);
                return;
            }

            clearBtn.classList.remove('hidden');
            activeQuery = query;
            const lowerQuery = query.toLowerCase();

            searchIndices = [];
            currentArtistData.forEach((item, idx) => {
                const text = (item.content || "").toLowerCase();
                const date = (item.date || "").toLowerCase();
                if (text.includes(lowerQuery) || date.includes(lowerQuery)) {
                    searchIndices.push(idx);
                }
            });

            if (searchIndices.length > 0) {
                nav.classList.remove('hidden');
                if (currentMatchIdx === -1) currentMatchIdx = 0;
                updateSearchUI();
                jumpToMatch(searchIndices[currentMatchIdx]);
            } else {
                currentMatchIdx = -1;
                updateSearchUI();
            }
        }

        function updateSearchUI() {
            const status = document.getElementById('searchStatus');
            status.innerText = searchIndices.length === 0 ? "0 / 0" : `${currentMatchIdx + 1} / ${searchIndices.length}`;
        }

        function navSearch(dir) {
            if (searchIndices.length === 0) return;
            currentMatchIdx += dir;
            if (currentMatchIdx < 0) currentMatchIdx = searchIndices.length - 1;
            if (currentMatchIdx >= searchIndices.length) currentMatchIdx = 0;
            updateSearchUI();
            jumpToMatch(searchIndices[currentMatchIdx]);
        }

        function jumpToMatch(dataIdx) {
            if (dataIdx >= displayedCount) {
                displayedCount = Math.min(dataIdx + PAGE_SIZE, currentArtistData.length);
                renderMessages(currentArtistName, true);
            } else {
                renderMessages(currentArtistName, true);
            }

            setTimeout(() => {
                const target = document.getElementById(`msg-${dataIdx}`);
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    const bubble = target.querySelector('.bubble-content');
                    if (bubble) {
                        bubble.classList.add('highlight-active');
                        setTimeout(() => bubble.classList.remove('highlight-active'), 1500);
                    }
                }
            }, 100);
        }

        function switchView(view) {
            currentView = view;
            const chatArea = document.getElementById('chatArea');
            const galleryArea = document.getElementById('galleryArea');
            const chatTab = document.getElementById('chatTab');
            const galleryTab = document.getElementById('galleryTab');

            if (view === 'chat') {
                chatArea.classList.remove('hidden');
                galleryArea.classList.add('hidden');
                chatTab.classList.add('active');
                galleryTab.classList.remove('active');
            } else {
                chatArea.classList.add('hidden');
                galleryArea.classList.remove('hidden');
                chatTab.classList.remove('active');
                galleryTab.classList.add('active');
                renderGallery();
            }
        }

        function closePopup() {
            const container = document.getElementById('popupContent');

            container.querySelectorAll('video').forEach(v => {
                try {
                    v.pause();
                    v.removeAttribute('src');
                    v.load();
                } catch (e) {}
            });

            container.innerHTML = '<div class="close-btn" onclick="closePopup()">✕</div>';
            document.getElementById('videoPopup').style.display = 'none';
        }

        function showPopup(fileId, type = 'video', directUrl = '', fallbackThumb = '') {
            const popup = document.getElementById('videoPopup');
            const container = document.getElementById('popupContent');
            container.innerHTML = '<div class="close-btn" onclick="closePopup()">✕</div>';

            if (!fileId && !directUrl && !fallbackThumb) {
                container.innerHTML += `<div class="img-error"><p>파일 정보가 없습니다.</p></div>`;
                popup.style.display = 'flex';
                return;
            }

            if (type === 'image') {
                const img = document.createElement('img');
                img.src = fallbackThumb || `https://drive.google.com/thumbnail?authuser=0&sz=w1600&id=${fileId}`;
                img.onerror = () => {
                    container.innerHTML += `
                        <div class="img-error">
                            <p>이미지 로드 실패</p>
                            ${fileId ? `<a href="https://drive.google.com/file/d/${fileId}/view" target="_blank" class="text-blue-500 font-bold mt-2 block underline">원본 링크 열기</a>` : ''}
                        </div>`;
                };
                container.appendChild(img);
                popup.style.display = 'flex';
                return;
            }

            const video = document.createElement('video');
            video.controls = true;
            video.autoplay = true;
            video.playsInline = true;
            video.preload = 'metadata';
            video.controlsList = 'nodownload';
            video.style.width = '100%';
            video.style.maxWidth = '100%';
            video.style.maxHeight = 'calc(100vh - 40px)';
            video.style.display = 'block';
            video.style.background = '#000';
            video.style.objectFit = 'contain';

            let triedFallback = false;

            video.onerror = () => {
                if (triedFallback) return;
                triedFallback = true;

                container.innerHTML = '<div class="close-btn" onclick="closePopup()">✕</div>';

                if (fileId) {
                    const iframe = document.createElement('iframe');
                    iframe.src = `https://drive.google.com/file/d/${fileId}/preview`;
                    iframe.allow = 'autoplay; fullscreen';
                    iframe.allowFullscreen = true;
                    iframe.style.width = '100%';
                    iframe.style.height = '90vh';
                    iframe.style.border = 'none';
                    iframe.style.display = 'block';
                    container.appendChild(iframe);
                } else {
                    container.innerHTML += `
                        <div class="img-error">
                            <p>영상 로드 실패</p>
                        </div>`;
                }
            };

            video.src = directUrl || `https://drive.google.com/uc?export=download&id=${fileId}&confirm=t`;
            container.appendChild(video);
            popup.style.display = 'flex';
        }

        function getMediaUrls(mediaMeta) {
            const link = typeof mediaMeta === 'string' ? mediaMeta : (mediaMeta?.link || "");
            const id = (typeof mediaMeta === 'object' && mediaMeta?.id) ? mediaMeta.id : extractDriveId(link);

            return {
                iframe: id ? `https://drive.google.com/file/d/${id}/preview` : link,
                image: id ? `https://drive.google.com/thumbnail?authuser=0&sz=w1000&id=${id}` : link,
                direct: id ? `https://drive.google.com/uc?export=download&id=${id}&confirm=t` : link,
                view: id ? `https://drive.google.com/file/d/${id}/view` : link,
                id
            };
        }

        function handleImgError(img, fileName, fileId) {
            img.parentElement.innerHTML = `<div class="img-error"><p>로드 실패</p>${fileId ? `<a href="https://drive.google.com/file/d/${fileId}/view" target="_blank" class="text-blue-500 underline font-bold text-[10px]">보기</a>` : ''}</div>`;
        }

        function highlightText(text) {
            let processed = (text || "").replace(/@@/g, userNickname);
            if (!activeQuery) return processed;
            const regex = new RegExp(`(${activeQuery})`, 'gi');
            return processed.replace(regex, '<mark class="highlight">$1</mark>');
        }

        function findMediaMetaByFileName(rawFileName) {
            const cleanFileName = (rawFileName || "").replace(/\s+/g, '').toLowerCase();
            const superKey = superClean(rawFileName || "");
            return mediaMap[cleanFileName] || mediaMap[superKey] || null;
        }

        function isImageItem(item, rawFileName) {
            const name = (rawFileName || "").toLowerCase();
            return item.type === 'image'
                || /\.(jpg|jpeg|png|gif|webp)$/i.test(name)
                || (item.content || "").includes('(사진)');
        }

        function renderMessages(artist, isReset = false) {
            const chatArea = document.getElementById('chatArea');
            if (isReset) {
                chatArea.innerHTML = "";
                if (activeQuery && currentMatchIdx !== -1) {
                    const targetIdx = searchIndices[currentMatchIdx];
                    displayedCount = Math.max(displayedCount, targetIdx + 1);
                }
            }

            const start = chatArea.children.length > 0 ? (isReset ? 0 : chatArea.querySelectorAll('.msg-item').length) : 0;
            const end = isReset ? displayedCount : Math.min(start + PAGE_SIZE, currentArtistData.length);

            let html = "";
            let lastDate = isReset ? "" : (chatArea.querySelectorAll('.date-divider').length > 0 ? chatArea.querySelectorAll('.date-divider')[chatArea.querySelectorAll('.date-divider').length-1].innerText : "");

            for (let i = start; i < end; i++) {
                const item = currentArtistData[i];
                const dObj = parseDate(item.date);
                const dStr = dObj.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                const tStr = dObj.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });
                const isArt = (item.sender === artist);

                if (lastDate !== dStr) {
                    html += `<div class="date-divider w-full text-center text-[#a0a0a0] text-[11px] my-6 font-medium">${dStr}</div>`;
                    lastDate = dStr;
                }

                const rawFileName = item.fileName || "";
                const mediaMeta = findMediaMetaByFileName(rawFileName);

                let contentHtml = "";
                if (mediaMeta) {
                    const urls = getMediaUrls(mediaMeta);
                    const isImg = isImageItem(item, rawFileName);

                    if (isImg) {
                        contentHtml = `
                            <div class="media-content thumbnail-mode" onclick="showPopup('${urls.id}', 'image', '', '${urls.image}')">
                                <img src="${urls.image}" loading="lazy" onerror="handleImgError(this, '${rawFileName}', '${urls.id}')">
                            </div>`;
                    } else {
                        const badgeText = (item.type === 'audio' || rawFileName.includes('음성')) ? '음성' : '영상';
                        contentHtml = `
                            <div class="media-content thumbnail-mode" onclick="showPopup('${urls.id}', 'video', '${urls.direct}', '${urls.image}')">
                                <div class="video-thumb-wrap">
                                    <img src="${urls.image}" loading="lazy" onerror="handleImgError(this, '${rawFileName}', '${urls.id}')">
                                    <div class="video-badge">${badgeText}</div>
                                    <div class="play-overlay">
                                        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                                            <path d="M8 5v14l11-7z"/>
                                        </svg>
                                    </div>
                                </div>
                            </div>`;
                    }
                } else {
                    const rawContent = (item.content || "");
                    contentHtml = highlightText(rawContent) || (rawFileName ? `<span class="text-xs text-gray-400 italic">[매칭 대기: ${rawFileName}]</span>` : "");
                }

                const prof = isArt ? selectedProfileImg : "";

                html += `
                    <div id="msg-${i}" class="msg-item flex w-full mt-4 ${!isArt ? 'justify-end' : 'justify-start'}">
                        ${isArt ? `<div class="w-10 h-10 rounded-full overflow-hidden mr-2 flex-shrink-0 border border-gray-200"><img src="${prof}" class="w-full h-full object-cover"></div>` : ""}
                        <div class="flex flex-col max-w-[85%] ${!isArt ? 'items-end' : 'items-start'}">
                            ${isArt ? `<div class="text-[13px] text-gray-800 mb-1 font-bold">${item.sender}</div>` : ""}
                            <div class="flex items-end gap-2 ${!isArt ? 'flex-row-reverse' : 'flex-row'}">
                                <div class="bubble-content shadow-sm transition-all duration-500 ${mediaMeta ? '' : 'px-4 py-2.5 text-[14px] ' + (!isArt ? 'bg-[#646464] text-white rounded-l-[18px] rounded-tr-[18px] rounded-br-[4px]' : 'bg-white text-gray-900 rounded-r-[18px] rounded-bl-[18px] rounded-tl-[4px]')}">
                                    ${contentHtml}
                                </div>
                                <div class="text-[10px] text-[#a3a3a3] min-w-max mb-1">${tStr}</div>
                            </div>
                        </div>
                    </div>`;
            }

            chatArea.insertAdjacentHTML('beforeend', html);
            if (!isReset) displayedCount = end;
        }

        function renderGallery() {
            const galleryArea = document.getElementById('galleryArea');
            const mediaItems = currentArtistData.filter(item => !!findMediaMetaByFileName(item.fileName || ""));

            if (mediaItems.length === 0) {
                galleryArea.innerHTML = `<div class="p-10 text-center text-gray-400 text-sm">미디어가 없습니다.</div>`;
                return;
            }

            let html = `<div class="gallery-grid">`;
            mediaItems.forEach(item => {
                const rawName = item.fileName || "";
                const mediaMeta = findMediaMetaByFileName(rawName);
                const urls = getMediaUrls(mediaMeta);
                const isImg = isImageItem(item, rawName);

                const dObj = parseDate(item.date);
                const dateDisplay = `${dObj.getMonth()+1}/${dObj.getDate()}`;
                const timeDisplay = dObj.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });

                html += `
                    <div class="gallery-item" onclick="showPopup('${urls.id}', '${isImg ? 'image' : 'video'}', '${urls.direct}', '${urls.image}')">
                        <img src="${urls.image}" loading="lazy" onerror="handleImgError(this, '${rawName}', '${urls.id}')">
                        <div class="absolute top-1 right-1 text-white drop-shadow-md">
                            ${!isImg ? '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>' : ''}
                        </div>
                        <div class="gallery-info">
                            <span>${dateDisplay}</span>
                            <span>${timeDisplay}</span>
                        </div>
                    </div>`;
            });
            html += `</div>`;
            galleryArea.innerHTML = html;
        }

        function enterChat(artist) {
            currentArtistName = artist;
            currentArtistData = (artist === '혀비' ? shData : hsData);
            displayedCount = PAGE_SIZE;
            selectedProfileImg = selectedProfileImg || defaultArtistCard[artist].url;

            document.getElementById('selectionScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
            document.getElementById('roomName').innerText = artist;

            switchView('chat');
            document.getElementById('chatArea').innerHTML = "";
            document.getElementById('galleryArea').innerHTML = "";
            document.getElementById('searchInput').value = "";
            document.getElementById('searchContainer').classList.remove('active');
            document.getElementById('searchNav').classList.add('hidden');
            document.getElementById('clearSearchBtn').classList.add('hidden');
            activeQuery = "";

            renderMessages(artist, true);

            const chatArea = document.getElementById('chatArea');
            chatArea.onscroll = function() {
                if (currentView === 'chat' && !activeQuery && this.scrollHeight - this.scrollTop <= this.clientHeight + 200) {
                    renderMessages(currentArtistName);
                }
            };
        }
    </script>
</body>
</html>
